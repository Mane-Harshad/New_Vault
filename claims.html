<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vaultify | Claim Pro Tracker</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="claims.css">
    <link rel="stylesheet" href="main.css">
    <script src="main.js"></script>
</head>
<body class="dash-container">

    <aside class="sidebar">
        <div class="brand">VAULT<span>IFY</span></div>
        <nav class="side-nav">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="vault.html" class="nav-link">My Vault</a>
            <a href="claims.html" class="nav-link active">Claim Tracker</a>
            <a href="analytics.html" class="nav-link">Analytics</a>
            <a href="settings.html" class="nav-link">Settings</a>
        </nav>
        <div class="user-profile">
            <div class="user-avatar" id="userInitial">U</div>
            <span id="userNameDisplay">HARRY</span>
        </div>
    </aside>

    <main class="main-viewport">
        <header class="dash-header">
            <h2 class="page-title">Claims & Warranty Center</h2>
            <button class="add-btn" onclick="openClaimInitiator()">+ INITIATE NEW CLAIM</button>
        </header>

        <section class="dash-section">
            <h3 class="section-label">URGENT REMINDERS</h3>
            <div class="reminder-flex" id="reminderContainer"></div>
        </section>

        <section class="dash-section">
            <h3 class="section-label">WARRANTY EXPIRY RADAR</h3>
            <div class="expiry-radar-grid" id="expiryRadar"></div>
        </section>

        <section class="dash-section">
            <h3 class="section-label">ACTIVE CLAIMS BOARD</h3>
            <div class="claims-list" id="activeClaimsList"></div>
        </section>
    </main>

    <div id="initiateModal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <div class="modal-header"><h3>Launch New Claim</h3></div>
            <div class="input-group">
                <label>Select Product from Vault</label>
                <select id="claimItemSelect" class="pro-input"></select>
            </div>
            <div class="input-group">
                <label>Claim Reason / Issue Description</label>
                <textarea id="issueDesc" rows="4" class="pro-input" placeholder="Explain the fault details..."></textarea>
            </div>
            <div class="modal-btns">
                <button onclick="closeModal('initiateModal')" class="btn-cancel">Discard</button>
                <button onclick="submitClaim()" class="btn-save">Submit Claim</button>
            </div>
        </div>
    </div>

    <div id="workspaceDrawer" class="overview-drawer">
        <div id="drawerUI"></div>
    </div>

    <script src="claims.js"></script>
</body>
</html>
